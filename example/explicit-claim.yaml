apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: my-traces
spec:
  devices:
    requests:
    - name: trace-shares
      exactly:
        deviceClassName: trace.example.com
        capacity:
          requests:
            shares: 50
---
apiVersion: v1
kind: Pod
metadata:
  name: trace-consumer-explicit
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "echo 'I have 50 trace shares (explicit claim)' && sleep 3600"]
    resources:
      claims:
      - name: trace-claim
  resourceClaims:
  - name: trace-claim
    resourceClaimName: my-traces
  restartPolicy: Never
